<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Onix Secure Browser</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #333;
            color: white;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        input {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            flex: 1;
        }
        iframe {
            width: 100%;
            border: 2px solid #ccc;
            border-radius: 10px;
            background: white;
        }
        #status {
            font-size: 0.9em;
            color: gray;
        }
        .url-bar {
            display: flex;
            gap: 10px;
        }
        .websocket {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>Onix Secure Browser</h1>
    
    <!-- Custom URL input -->
    <div class="url-bar">
        <input type="text" id="custom-url" placeholder="Enter custom URL here">
        <button id="go-btn">Go</button>
    </div>
    
    <div class="websocket">
        <input type="text" id="custom-websocket" placeholder="Enter custom websocket here.">
        <button id="use-btn">Use</button>
        <button id="default-btn">Default</button>
    </div>
    
    <!-- Preset buttons -->
    <div>
        <button>https://example.com</button>
        <button>https://wikipedia.org</button>
        <button>https://mojeek.com</button>
        <button>https://ifconfig.me</button>
        <button>https://tenor.com</button>
    </div>
    
    
    <p id="status">Connecting...</p>
    <iframe id="viewer" height=640></iframe>
    
    <script>
        let customwstext = "wss://onix-server-official.onrender.com";
        let ws = new WebSocket(customwstext);
        const status = document.getElementById('status');
        const iframe = document.getElementById('viewer');
        let currenturl;
         
        // 🔁 Function to bind listeners to a given socket
        function bindSocket(socket) {
            socket.addEventListener("open", () => {
                setTimeout(() => {
                status.textContent = `✅ Connected to ${socket.url}`;
                }, 500)
            });
            
            socket.addEventListener("close", () => {
                status.textContent = "❌ Disconnected.";
            });
            
            socket.addEventListener("error", (err) => {
                console.error(err);
                status.textContent = "⚠️ WebSocket error. Check URL.";
            });
            
            socket.addEventListener("message", (event) => {
                iframe.srcdoc = event.data;
                iframe.onload = () => {
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        
                        // link handling
                        iframeDoc.querySelectorAll('[href]').forEach(el => {
                            const rawHref = el.getAttribute('href');
                            if (!rawHref) return;
                            
                            el.addEventListener('click', (e) => {
                                e.preventDefault();
                                const resolved = new URL(rawHref, currenturl).href;
                                currenturl = resolved;
                                status.textContent = `🌐 Loading ${resolved}`;
                                socket.send(resolved);
                            });
                        });
                        
                        // form handling
                        iframeDoc.querySelectorAll('form').forEach(form => {
                            form.addEventListener('submit', (e) => {
                                e.preventDefault();
                                const action = form.getAttribute('action') || currenturl;
                                const params = new URLSearchParams(new FormData(form)).toString();
                                const full = action.includes('?') ? `${action}&${params}` : `${action}?${params}`;
                                currenturl = full;
                                status.textContent = `🌐 Submitting form: ${full}`;
                                socket.send(full);
                            });
                        });
                        
                    } catch (err) {
                        console.warn('iframe sandbox blocked access:', err);
                    }
                };
            });
        }
        
        // connect the default socket
        bindSocket(ws);
        
        // handle preset buttons
        document.querySelectorAll('button').forEach(el => {
            const url = el.textContent.trim();
            if (!url.startsWith('http')) return; // skip the non-URL buttons
            el.addEventListener('click', () => {
                currenturl = url;
                status.textContent = `🌐 Loading ${url}...`;
                ws.send(url);
            });
        });
        
        // custom URL input
        const input = document.getElementById('custom-url');
        document.getElementById('go-btn').addEventListener('click', () => {
            const url = input.value.trim();
            if (!url) return;
            currenturl = url;
            status.textContent = `🌐 Loading ${url}...`;
            ws.send(url);
        });
        
        // custom WebSocket input ✅
        const customws = document.getElementById('custom-websocket');
        document.getElementById('use-btn').addEventListener('click', () => {
            const newWSText = customws.value.trim();
            if (!newWSText) return;
            
            status.textContent = `☁️ Switching to ${newWSText}...`;
            
            try {
                ws.close(); // close old socket if still open
            } catch {}
            
            ws = new WebSocket(newWSText);
            bindSocket(ws);
        });
        document.getElementById('default-btn').addEventListener('click', () => {
            const newWSText = "wss://onix-server-official.onrender.com/"
            if (!newWSText) return;
            
            status.textContent = `☁️ Switching to ${newWSText}...`;
            
            try {
                ws.close(); // close old socket if still open
            } catch {}
            
            ws = new WebSocket(newWSText);
            bindSocket(ws);
        });
        

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('go-btn').click();
            }
        });
        customws.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('use-btn').click();
            }
        });
    </script>
</body>
</html>
